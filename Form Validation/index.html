<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Login/Register</h1>
        <form action="" class="form" id="form">

            <div class="form-control">

                <label for="username">username</label>
                <input type="text" class="username" id="username"></input>
                <li class="fa fa-check"></li>
                <li class="fa fa-close"></li>
                <small>Error Message</small>
            </div>

            <div class="form-control">

                <label for="Email">Email</label>
                <input type="text" class="Email" id="email"></input>
                <li class="fa fa-check"></li>
                <li class="fa fa-close"></li>
                 <small>Error Message</small>

            </div>

            <div class="form-control">

                <label for="password">Password</label>
                <input type="password" class="Password" id="password"></input>
                <li class="fa fa-check"></li>
                <li class="fa fa-close"></li>
                <small>Error Message</small>

            </div>

            <div class="form-control">

                <label for="Confim Paswword">Confim Password</label>
                <input type="password" class="Confim Paswword" id="confirmPassword"></input>
                <li class="fa fa-check"></li>
                <li class="fa fa-close"></li>
                <small>Error Message</small>
                

            </div>
            <button type="submit" class="btn" >Submit</button>


        </form>
    </div>
    <script src="./main.js"></script>
    
</body>
</html>
